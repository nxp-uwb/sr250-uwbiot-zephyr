CONFIG_NXP_UWB_ZEPHYR_MODULE=y
CONFIG_NXP_UWB_DEVICE_SR2XXT=y
CONFIG_NUM_PREEMPT_PRIORITIES=15
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_UART_MCUX_FLEXCOMM=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SERIAL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_TEST=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_SPI_MCUX_FLEXCOMM=y
CONFIG_SPI_MCUX_FLEXCOMM_DMA=y
CONFIG_MULTITHREADING=y
CONFIG_SCHED_DEADLINE=y
CONFIG_SPI_EXTENDED_MODES=y
CONFIG_SPI_ASYNC=y
CONFIG_I2C=y
CONFIG_ASSERT=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
# Below Configs should be enable for the MCTT/PnP
# Completely silence Zephyr Booting logs
CONFIG_BOOT_BANNER=n
# Completely silence USB device stack logs
CONFIG_USB_DEVICE_LOG_LEVEL_OFF=y
# Completely silence USB CDC ACM logs (VCOM logs)
CONFIG_USB_CDC_ACM_LOG_LEVEL_OFF=y
# Completely silence USB DC driver logs (e.g., usb_dc_nxp)
CONFIG_USB_DRIVER_LOG_LEVEL_OFF=y
# Optionally disable logging subsystem if you don't use it elsewhere
CONFIG_LOG=y

